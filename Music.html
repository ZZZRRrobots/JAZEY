<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTiger Vinyl Music</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #111111);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    margin: 20px;
    color: #FFD700;
    text-align: center;
  }

  /* Song Buttons */
  .song-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
  }

  .song-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    border: 2px solid #FFD700;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    width: 100px;
  }

  .song-button:hover {
    transform: scale(1.05);
    background: #333;
  }

  .song-button img {
    width: 100%;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
  }

  .song-button span {
    margin-top: 5px;
    font-weight: bold;
    text-align: center;
  }

  /* Vinyl Container */
  .vinyl-container {
    position: relative;
    margin-top: 50px;
    width: 70vw;
    max-width: 350px;
    aspect-ratio: 1/1;
  }

  /* CSS Vinyl Disc */
  .vinyl {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at center, #000 0%, #111 40%, #222 100%);
    border: 4px solid #333;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: center center;
  }

  .vinyl.spin {
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Cartoon Hand */
  .hand {
    position: absolute;
    width: 80px;
    height: 80px;
    background: url('hand.png') no-repeat center/contain;
    top: -20px;
    right: -20px;
    transform-origin: top left;
    transition: transform 0.5s;
    display: none;
  }

  .hand.play {
    transform: rotate(25deg);
    display: block;
  }

  /* Footer */
  footer {
    margin-top: 50px;
    color: #888;
    text-align: center;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .song-button {
      width: 80px;
    }

    .song-button img {
      height: 80px;
    }

    .vinyl-container {
      width: 80vw;
      max-width: 250px;
    }

    .hand {
      width: 60px;
      height: 60px;
      top: -15px;
      right: -15px;
    }
  }

</style>
</head>
<body>

<h1>ZTiger Vinyl Music</h1>

<div class="song-buttons">
  <div class="song-button" data-song="song1.mp3" data-vinyl="vinyl1.png">
    <img src="cover1.png" alt="Song 1 Cover">
    <span>Every Version of Life</span>
  </div>
  <div class="song-button" data-song="song2.mp3" data-vinyl="vinyl2.png">
    <img src="cover2.png" alt="Song 2 Cover">
    <span>World Smiles</span>
  </div>
  <div class="song-button" data-song="song3.mp3" data-vinyl="vinyl3.png">
    <img src="cover3.png" alt="Song 3 Cover">
    <span>Always You</span>
  </div>
</div>

<div class="vinyl-container">
  <div class="vinyl" id="vinyl"></div>
  <div class="hand" id="hand"></div>
</div>

<audio id="audio"></audio>

<footer>🖤💛 ZTiger Music</footer>

<script>
const buttons = document.querySelectorAll('.song-button');
const vinyl = document.getElementById('vinyl');
const hand = document.getElementById('hand');
const audio = document.getElementById('audio');

buttons.forEach(button => {
  button.addEventListener('click', () => {
    // Stop current audio
    audio.pause();
    audio.currentTime = 0;

    // Play new audio
    const song = button.getAttribute('data-song');
    audio.src = song;
    audio.play();

    // Show vinyl
    vinyl.style.display = 'block';
    vinyl.classList.add('spin');

    // Show hand
    hand.style.display = 'block';
    hand.classList.add('play');

    // When song ends
    audio.onended = () => {
      vinyl.classList.remove('spin');
      hand.classList.remove('play');
    };
  });
});
</script>

</body>
</html>
