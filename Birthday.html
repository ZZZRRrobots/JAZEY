<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#0e000a",
              "surface-container-low": "#111417",
              "surface": "#0c0e12",
              "on-primary-fixed": "#003d43",
              "on-tertiary": "#430036",
              "on-primary-container": "#005159",
              "on-primary-fixed-variant": "#005c64",

              "on-secondary-container": "#f8f1ff",
              "inverse-on-surface": "#535559",
              "surface-container-highest": "#22262b",
              "on-primary": "#005b64",
              "tertiary-dim": "#ff5ed6",
              "inverse-surface": "#f8f9fe",
              "surface-bright": "#282c32",
              "tertiary-fixed": "#ff87da",
              "tertiary": "#ff5ed6",
              "inverse-primary": "#006973",
              "secondary": "#ac89ff",
              "error": "#ff716c",

              "surface-tint": "#90f1ff",
              "primary": "#90f1ff",

              "on-error": "#490006",

              "error-container": "#9f0519",

              "on-background": "#f8f9fe",
              "secondary-fixed-dim": "#ceb9ff",
              "on-error-container": "#ffa8a3",
              "on-surface-variant": "#a9abb0",
              "secondary-dim": "#874cff",
              "outline": "#73757a",
              "surface-variant": "#22262b",
              "primary-container": "#00eaff",
              "tertiary-fixed-dim": "#ff6bd7",
              "on-tertiary-fixed": "#34002a",
              "tertiary-container": "#ff00d4",
              "on-tertiary-fixed-variant": "#6f005b",
              "surface-container": "#171a1e",
              "background": "#0c0e12",
              "outline-variant": "#46484c"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cosmic-gradient {
            background: radial-gradient(circle at center, rgba(144, 241, 255, 0.05) 0%, rgba(12, 14, 18, 1) 70%);
        }
        .glass-panel {
            background: rgba(34, 38, 43, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#0c0e12]/60 backdrop-blur-lg">
<div class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#90f1ff] to-[#ac89ff] font-headline uppercase tracking-widest">
            Stellar Gala
        </div>
<div class="flex items-center gap-6">
<button class="material-symbols-outlined text-slate-400 hover:text-[#90f1ff] hover:drop-shadow-[0_0_8px_rgba(144,241,255,0.8)] active:scale-95 transition-transform duration-300 ease-out" data-icon="auto_awesome">auto_awesome</button>
<button class="material-symbols-outlined text-slate-400 hover:text-[#90f1ff] hover:drop-shadow-[0_0_8px_rgba(144,241,255,0.8)] active:scale-95 transition-transform duration-300 ease-out" data-icon="notifications">notifications</button>
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/20 overflow-hidden">
<img alt="User profile avatar" data-alt="close up of a professional minimalist avatar silhouette against a dark cosmic background with soft blue backlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBstjASvWkGfhfMqTCvmTKM7eNSgz_c00zoV3ocp5xaiUUxeKAGc1ga3CrpvwQ9LItgdDKC3rWllbGoDwYq8jY1Y9ryYl9nrGRcoarkTPZD1ojMoRfZjxpCLqGqMReCkIPnXh-9ddIW1P6g-7zjxDlmwVGcKXNXxRT2oOJS1yr8zLmbsw-TToz0SmwAY44nSraGQ1HRZuyviu-Cbn1SWqsvcF4RKOUvniZgWlxSqgdDNcnctywx--D5GL_ZpZv78xQk4SR6wpWJPeA"/>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="relative h-screen w-full cosmic-gradient flex flex-col items-center justify-center p-6">
<!-- Ambient Orbital Glows -->
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[600px] h-[600px] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Hero Identity -->
<div class="absolute top-1/4 transform -translate-y-1/2 text-center z-10">
<p class="font-label text-xs uppercase tracking-[0.5em] text-primary/60 mb-4">Establishing Uplink for</p>
<h1 class="font-headline text-8xl md:text-[12rem] font-bold tracking-tighter text-on-surface/90 leading-none">
                JU<span class="text-transparent bg-clip-text bg-gradient-to-b from-primary to-secondary">JU</span>
</h1>
</div>
<!-- Particle-Themed Countdown Centerpiece -->
<div class="relative z-20 flex flex-col items-center gap-12 mt-32">
<!-- Countdown Bento Grid -->
<div class="grid grid-cols-3 gap-6 md:gap-8 max-w-2xl w-full">
<!-- Days/Hours -->
<div class="glass-panel p-8 rounded-xl border border-outline-variant/10 text-center flex flex-col items-center justify-center shadow-[0_0_30px_rgba(0,234,255,0.05)]">
<span class="font-headline text-5xl md:text-6xl font-light text-primary tracking-tighter">00</span>
<span class="font-label text-[10px] uppercase tracking-widest text-outline mt-2">Days</span>
</div>
<!-- Minutes -->
<div class="glass-panel p-8 rounded-xl border border-outline-variant/10 text-center flex flex-col items-center justify-center shadow-[0_0_30px_rgba(0,234,255,0.05)]">
<span class="font-headline text-5xl md:text-6xl font-light text-primary tracking-tighter">00</span>
<span class="font-label text-[10px] uppercase tracking-widest text-outline mt-2">Minutes</span>
</div>
<!-- Seconds -->
<div class="glass-panel p-8 rounded-xl border border-outline-variant/10 text-center flex flex-col items-center justify-center shadow-[0_0_40px_rgba(0,234,255,0.1)] relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-t from-primary/10 to-transparent"></div>
<span class="font-headline text-5xl md:text-6xl font-bold text-primary tracking-tighter relative z-10">04</span>
<span class="font-label text-[10px] uppercase tracking-widest text-primary/60 mt-2 relative z-10">Seconds</span>
</div>
</div>
<!-- Interaction Prompt: Ready State -->
<div class="flex flex-col items-center gap-6 group">
<div class="relative flex items-center justify-center">
<!-- Pulsing Outer Ring -->
<div class="absolute w-24 h-24 rounded-full border border-primary/20 scale-125 opacity-0 group-hover:opacity-100 group-hover:scale-150 transition-all duration-700"></div>
<div class="absolute w-20 h-20 rounded-full border border-primary/40 scale-110 opacity-0 group-hover:opacity-100 group-hover:scale-125 transition-all duration-500 delay-75"></div>
<!-- Main Interaction Button -->
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-secondary-dim p-[2px] shadow-[0_0_30px_rgba(144,241,255,0.3)] hover:shadow-[0_0_50px_rgba(144,241,255,0.5)] transition-all active:scale-90">
<div class="w-full h-full rounded-full bg-surface flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">flare</span>
</div>
</button>
</div>
<div class="text-center">
<h3 class="font-headline text-2xl text-on-surface font-light tracking-wide mb-2 uppercase">Celestial Alignment Ready</h3>
<p class="font-label text-sm text-outline tracking-widest uppercase flex items-center gap-2 justify-center">
                        Hold <span class="text-primary font-bold">🤟</span> to Reveal
                    </p>
</div>
</div>
</div>
<!-- Background Particle Simulation Decorative Elements -->
<div class="absolute inset-0 pointer-events-none opacity-40 overflow-hidden">
<!-- Simulated star field elements -->
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full blur-[1px]"></div>
<div class="absolute top-1/3 right-1/4 w-[2px] h-[2px] bg-primary rounded-full blur-[1px]"></div>
<div class="absolute bottom-1/4 left-1/2 w-1 h-1 bg-secondary rounded-full blur-[1px]"></div>
<div class="absolute top-[10%] right-[10%] w-[3px] h-[3px] bg-white rounded-full blur-[2px]"></div>
<img alt="Star field" class="absolute w-full h-full object-cover mix-blend-screen opacity-20" data-alt="stunning wide angle shot of deep space nebula with swirling cyan and violet cosmic dust and bright distant stars" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATBwxEf9BpCcJQD5vSIah5qUtyCgScenGQY8ltJCJjhn1YmR5s4q-nppb_ykvr0lKGXrwoEn9hgczU2abtG-RuerPhX7o9DR-f3FT9j2g3wr8NV-8XNlMDqfHcEN7yjWs5L-UcI0og1cyb60YHmhSoSkdGd_6idZReveQqMoxypmjQqJBnknYklUZKq0UtkXccNtApmBQ_Nia_sm1_DQ-6sxwh4uktm66_YS-brlP4T2ZOp44aKCdFdFHCACaFV3WvELqEMOIYqnY"/>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#0c0e12]/40 backdrop-blur-2xl border-t border-[#90f1ff]/10 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Countdown Active Tab -->
<div class="flex flex-col items-center justify-center bg-gradient-to-b from-[#00eaff]/20 to-transparent text-[#00eaff] rounded-2xl px-6 py-2 shadow-[inset_0_0_10px_rgba(0,234,255,0.2)] active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium tracking-widest uppercase">Countdown</span>
</div>
<!-- Reveal Tab -->
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 hover:text-[#90f1ff] active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="flare">flare</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium tracking-widest uppercase">Reveal</span>
</div>
<!-- Message Tab -->
<div class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 hover:text-[#90f1ff] active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="auto_fix_high">auto_fix_high</span>
<span class="font-['Space_Grotesk'] text-[10px] font-medium tracking-widest uppercase">Message</span>
</div>
</nav>
</body></html>
