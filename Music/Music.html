<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTiger Vinyl Music</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #111111);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  margin: 20px;
  color: #FFD700;
  text-align: center;
}

/* Song Buttons */
.song-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.song-button {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #222;
  border: 2px solid #FFD700;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  width: 100px;
}

.song-button:hover {
  transform: scale(1.05);
  background: #333;
}

.song-button img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

.song-button span {
  margin-top: 5px;
  font-weight: bold;
  text-align: center;
}

/* Vinyl Box / Cartoon Turntable */
.vinyl-container {
  position: relative;
  margin-top: 50px;
  width: 280px;
  height: 180px;
  background: linear-gradient(to bottom, #c48e5a, #a06330); /* cartoon wood effect */
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Vinyl Disc Image */
.vinyl {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: none;
  transform-origin: center center;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Spin Animation */
.vinyl.spin {
  animation: spin 3s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Cartoon Hand / Tonearm */
.hand {
  position: absolute;
  width: 100px;
  height: 15px;
  background: #ccc;
  top: 20px;
  left: 190px; /* connected to box */
  transform-origin: left center;
  border-radius: 10px 0 0 10px;
  display: none;
  z-index: 10;
}

.hand::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: #888;
  border-radius: 50%;
  right: -10px;
  top: -2.5px;
}

.hand.play {
  transform: rotate(25deg);
  display: block;
}

/* Control Buttons on Vinyl Box */
.controls {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.control-btn {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: 2px solid #FFD700;
  background: #fff0;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}

.control-btn:hover {
  background: #ffd700;
  color: #000;
}

/* Footer */
footer {
  margin-top: 50px;
  color: #888;
  text-align: center;
}

/* Responsive */
@media (max-width: 600px) {
  .song-button {
    width: 80px;
  }

  .song-button img {
    height: 80px;
  }

  .vinyl-container {
    width: 90vw;
    max-width: 250px;
    height: 150px;
    padding: 15px;
  }

  .vinyl {
    width: 100px;
    height: 100px;
  }

  .hand {
    width: 70px;
    height: 10px;
    top: 15px;
    left: 140px;
  }

  .hand::after {
    width: 15px;
    height: 15px;
    top: -2.5px;
    right: -7.5px;
  }

  .control-btn {
    width: 30px;
    height: 30px;
  }
}
</style>
</head>
<body>

<h1>ZTiger Vinyl Music</h1>

<div class="song-buttons">
  <div class="song-button" data-song="song1.mp3" data-vinyl="vinyl1.png">
    <img src="cover1.png" alt="Song 1 Cover">
    <span>Every Version of Life</span>
  </div>
  <div class="song-button" data-song="song2.mp3" data-vinyl="vinyl2.png">
    <img src="cover2.png" alt="Song 2 Cover">
    <span>World Smiles</span>
  </div>
  <div class="song-button" data-song="song3.mp3" data-vinyl="vinyl3.png">
    <img src="cover3.png" alt="Song 3 Cover">
    <span>Always You</span>
  </div>
</div>

<div class="vinyl-container">
  <img src="" alt="Vinyl" class="vinyl" id="vinyl">
  <div class="hand" id="hand"></div>

  <!-- Control Buttons -->
  <div class="controls">
    <div class="control-btn" id="prev">&#9664;</div>
    <div class="control-btn" id="play">&#9654;</div>
    <div class="control-btn" id="pause">&#10074;&#10074;</div>
    <div class="control-btn" id="stop">&#9632;</div>
    <div class="control-btn" id="next">&#9654;&#9654;</div>
  </div>
</div>

<audio id="audio"></audio>

<footer>🖤💛 ZTiger Music</footer>

<script>
const buttons = document.querySelectorAll('.song-button');
const vinyl = document.getElementById('vinyl');
const hand = document.getElementById('hand');
const audio = document.getElementById('audio');

let currentIndex = 0;
const songs = Array.from(buttons).map(btn => ({
  song: btn.getAttribute('data-song'),
  vinyl: btn.getAttribute('data-vinyl')
}));

function loadSong(index) {
  const {song, vinyl: vinylImg} = songs[index];
  audio.src = song;
  vinyl.src = vinylImg;
  vinyl.style.display = 'block';
  vinyl.classList.add('spin');
  hand.style.display = 'block';
  hand.classList.add('play');
}

buttons.forEach((button, i) => {
  button.addEventListener('click', () => {
    currentIndex = i;
    loadSong(currentIndex);
    audio.play();
  });
});

// Controls
document.getElementById('play').addEventListener('click', () => audio.play());
document.getElementById('pause').addEventListener('click', () => audio.pause());
document.getElementById('stop').addEventListener('click', () => {
  audio.pause();
  audio.currentTime = 0;
  vinyl.classList.remove('spin');
  hand.classList.remove('play');
});
document.getElementById('next').addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % songs.length;
  loadSong(currentIndex);
  audio.play();
});
document.getElementById('prev').addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  loadSong(currentIndex);
  audio.play();
});

// Stop vinyl spinning when song ends
audio.addEventListener('ended', () => {
  vinyl.classList.remove('spin');
  hand.classList.remove('play');
});
</script>

</body>
</html>
