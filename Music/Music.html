<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTiger Vinyl Music</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #111111);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  margin: 20px;
  color: #FFD700;
  text-align: center;
}

/* Song Buttons */
.song-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.song-button {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #222;
  border: 2px solid #FFD700;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  width: 100px;
}

.song-button:hover {
  transform: scale(1.05);
  background: #333;
}

.song-button img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

.song-button span {
  margin-top: 5px;
  font-weight: bold;
  text-align: center;
}

/* Vinyl Box / Cartoon Turntable - Updated */
.vinyl-container {
  position: relative;
  margin-top: 50px;
  width: 280px;
  height: 180px;
  background: linear-gradient(to bottom, #e3b87a, #c68642);
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -5px 10px rgba(0,0,0,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Top highlight to make it look like polished wood */
.vinyl-container::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 25px;
  border-radius: 25px 25px 0 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
}

/* Vinyl Disc Image - pop with shadow & tilt animation */
.vinyl {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  display: none;
  transform-origin: center center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.2);
  z-index: 5;
}

/* Spin + tilt Animation */
.vinyl.spin {
  animation: spinTilt 3s linear infinite;
}

@keyframes spinTilt {
  0% { transform: rotate(0deg) rotateX(0deg); }
  25% { transform: rotate(90deg) rotateX(2deg); }
  50% { transform: rotate(180deg) rotateX(0deg); }
  75% { transform: rotate(270deg) rotateX(-2deg); }
  100% { transform: rotate(360deg) rotateX(0deg); }
}

/* Cartoon Hand / Tonearm */
.hand {
  position: absolute;
  width: 80px;
  height: 6px;
  background: #111;
  top: 65px;
  left: 170px;
  transform-origin: left center;
  border-radius: 5px;
  display: none;
  z-index: 10;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

.hand::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  background: #FFD700;
  border-radius: 50%;
  right: -6px;
  top: -3px;
  box-shadow: 0 0 5px rgba(0,0,0,0.7);
}

.hand.play {
  transform: rotate(25deg);
  display: block;
  transition: transform 0.3s ease-in-out;
}

/* Play/Pause Button - upgraded */
.play-pause-btn {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 45px;
  height: 45px;
  background: #FFD700;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  font-weight: bold;
  color: #111;
  font-size: 22px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.6), inset 0 -2px 5px rgba(255,255,255,0.3);
  transition: transform 0.2s;
  z-index: 15;
}

.play-pause-btn:hover {
  transform: translateX(-50%) scale(1.1);
}

/* Footer */
footer {
  margin-top: 50px;
  color: #888;
  text-align: center;
}

/* Responsive */
@media (max-width: 600px) {
  .song-button {
    width: 80px;
  }
  .song-button img {
    height: 80px;
  }
  .vinyl-container {
    width: 90vw;
    max-width: 250px;
    height: 150px;
    padding: 15px;
  }
  .vinyl {
    width: 100px;
    height: 100px;
  }
  .hand {
    width: 60px;
    height: 4px;
    top: 50px;
    left: 120px;
  }
  .hand::after {
    width: 10px;
    height: 10px;
    top: -2px;
    right: -5px;
  }
  .play-pause-btn {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }
}
</style>
</head>
<body>

<h1>ZTiger Vinyl Music</h1>

<div class="song-buttons">
  <div class="song-button" data-song="song1.mp3" data-vinyl="vinyl1.png">
    <img src="cover1.png" alt="Song 1 Cover">
    <span>Every Version of Life</span>
  </div>
  <div class="song-button" data-song="song2.mp3" data-vinyl="vinyl2.png">
    <img src="cover2.png" alt="Song 2 Cover">
    <span>World Smiles</span>
  </div>
  <div class="song-button" data-song="song3.mp3" data-vinyl="vinyl3.png">
    <img src="cover3.png" alt="Song 3 Cover">
    <span>Always You</span>
  </div>
  <div class="song-button" data-song="song4.mp3" data-vinyl="vinyl4.png">
    <img src="cover4.png" alt="Song 4 Cover">
    <span>Even My Mind Chose You</span>
  </div>
</div>

<div class="vinyl-container">
  <img src="" alt="Vinyl" class="vinyl" id="vinyl">
  <div class="hand" id="hand"></div>
  <div class="play-pause-btn" id="playPauseBtn">&#9654;</div>
</div>

<audio id="audio"></audio>

<footer>🖤💛 ZTiger Music</footer>

<script>
const buttons = document.querySelectorAll('.song-button');
const vinyl = document.getElementById('vinyl');
const hand = document.getElementById('hand');
const audio = document.getElementById('audio');
const playPauseBtn = document.getElementById('playPauseBtn');

let currentIndex = 0;
const songs = Array.from(buttons).map(btn => ({
  song: btn.getAttribute('data-song'),
  vinyl: btn.getAttribute('data-vinyl')
}));
let isPlaying = false;

function loadSong(index) {
  const { song, vinyl: vinylImg } = songs[index];
  audio.src = song;
  vinyl.src = vinylImg;

  // Show vinyl and hand
  vinyl.style.display = 'block';
  hand.style.display = 'block';

  // Reset animations
  vinyl.classList.remove('spin');
  hand.classList.remove('play');
  void vinyl.offsetWidth; // trigger reflow to restart animation
}

function playSong() {
  audio.play();
  vinyl.classList.add('spin');
  hand.classList.add('play');
  playPauseBtn.innerHTML = '&#10074;&#10074;'; // pause
  isPlaying = true;
}

function pauseSong() {
  audio.pause();
  vinyl.classList.remove('spin');
  hand.classList.remove('play');
  playPauseBtn.innerHTML = '&#9654;'; // play
  isPlaying = false;
}

// Click on song buttons
buttons.forEach((button, i) => {
  button.addEventListener('click', () => {
    if (currentIndex !== i) {
      currentIndex = i;
      loadSong(currentIndex);
    }
    playSong();
  });
});

// Play/pause button
playPauseBtn.addEventListener('click', () => {
  if (isPlaying) pauseSong();
  else playSong();
});

// When song ends
audio.addEventListener('ended', () => {
  pauseSong();
});
</script>

</body>
</html>
